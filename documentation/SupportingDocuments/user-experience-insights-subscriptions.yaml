openapi: 3.0.3
info:
  title: User Experience Insights Subscriptions
  version: wip
  x-camara-commonalities: 0.8.0-rc.2
  description: |
    With CAMARA User Experience Insights subscription service, application developers can obtain detailed usage statistics and network experience ratings for network quality. By tracking users' network status and the usage status of different applications in real time, it is possible to accurately identify users and application services with poor quality. This allows for recommending applications with better experiences or improving user experience through single-user assurance.

    # Introduction
    
    The User Experience Insights API allows application developers to subscribe to the network to achieve the following functions. 
    
    This information helps application providers monitor the quality of experience(QoE) of applications, identify areas with poor QoS, and deploy distributed network services accordingly.
    
    This information can be used to monitor the network quality on the paths of VIP users, detect quality problems in a timely manner, and take protective measures to prevent user complaints and improve user satisfaction.
    
    This information can be used to monitor the poor experience of similar applications in roaming areas and recommend the application with the optimal experience in different roaming areas.
    
    for Example, An application vendor wants to gain insights into and assess the network quality of its application in a specific region. The application service identifies a group of users who frequently use the application in that region and uses this API to monitor the application's performance. Through sample evaluation, if the network quality is found to be poor, the vendor can recommend deploying new devices or offering a premium package to improve network quality, thereby enhancing user retention.
    # Relevant terms and definitions

    * **Device**: A device refers to any physical entity that can connect to a network and participate in network communication.

    # API functionality
    The API provides the datatype parameter to report network quality at different granularities. Poor-QoE events are reported in real time when the network detects poor-QoE events.
    
    This API provides detailed data reporting, including basic application statistics (such as uplink statistics, downlink statistics, number of lost packets, valid uplink bandwidth, valid downlink bandwidth, average uplink bandwidth, and statistical summaries of periodic applications) and experience analysis data (such as application rating, maximum resolution, duration at maximum resolution, uplink bit rate, downlink bit rate, stalling duration, latency, and application creation latency).
    
    This API provides the function of reporting poor-QoE data in real time or periodically reporting no poor-QoE data based on the datatype parameter.
    POOR_QOE_REPORT Detects poor network experience and reports the collected statistical data. 
    PERIODIC_REPORT Periodically collecting and reporting data. 
    ALL  Detects data collected and reported by the poor network experience reporting function. If no poor quality is detected, the data is reported periodically.
    
    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.

    # Identifying the device from the access token

    This API requires the API consumer to identify a device as the subject of the API as follows:
    - When the API is invoked using a two-legged access token, the subject will be identified from the optional `device` object, which therefore MUST be provided.
    - When a three-legged access token is used however, this optional identifier MUST NOT be provided, as the subject will be uniquely identified from the access token.

    This approach simplifies API usage for API consumers using a three-legged access token to invoke the API by relying on the information that is associated with the access token and was identified during the authentication process.

    ## Error handling:

    - If the subject cannot be identified from the access token and the optional `device` object is not included in the request, then the server will return an error with the `422 MISSING_IDENTIFIER` error code.

    - If the subject can be identified from the access token and the optional `device` object is also included in the request, then the server will return an error with the `422 UNNECESSARY_IDENTIFIER` error code. This will be the case even if the same device is identified by these two methods, as the server is unable to make this comparison.
    
    ### Notification callback

    This endpoint describes the event notification received on subscription listener side when the event occurred.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

externalDocs:
  description: Product documentation at CAMARA.
  url: https://github.com/camaraproject/UserExperienceInsights

servers:
  - url: "{apiRoot}/user-experience-insights-subscriptions"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: |
          API root, defined by service provider, e.g.
          `api.example.com` or `api.example.com/somepath`

tags:
  - name: User Experience Insights Subscriptions
    description: |
      Create and manage a subscription to receive periodic user experience insights

paths:
  /subscriptions:
    post:
      tags:
        - User Experience Insights Subscriptions
      description: "Create a User Experience Insights Subscription for a device"
      summary: "Create a User Experience Insights Subscription for a device"
      operationId: createSubscription
      parameters:
        - $ref: "#/components/parameters/x-correlator"
      security:
        - openId:
            - user-experience-insights-subscriptions:create

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionRequest"
        required: true
      callbacks:
        notifications:
          "{$request.body#/sink}":
            post:
              summary: "Subscription notification callback"
              description: |
                Important: this endpoint is to be implemented by the API consumer.The User Experience Insights server will call this endpoint whenever a user experience event occurs that changes the network's ability to meet the application's demands for a given device.
              operationId: postNotification
              parameters:
                - $ref: "#/components/parameters/x-correlator"
              requestBody:
                content:
                  application/cloudevents+json:
                    schema:
                      $ref: "#/components/schemas/NotificationEvent"
                required: true
              responses:
                "204":
                  description: Successful notification
                  headers:
                    x-correlator:
                      $ref: "#/components/headers/x-correlator"
                "400":
                  $ref: "#/components/responses/Generic400"
                "401":
                  $ref: "#/components/responses/Generic401"
                "403":
                  $ref: "#/components/responses/Generic403"
                "410":
                  $ref: "#/components/responses/Generic410"
                "429":
                  $ref: "#/components/responses/Generic429"
              security:
                - {}
                - notificationsBearerAuth: []
      responses:
        "201":
          description: Created
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "202":
          description: Request accepted to be processed. It applies for async creation process.
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAsync"
        "400":
          $ref: "#/components/responses/CreateSubscriptionBadRequest400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/SubscriptionPermissionDenied403"
        "409":
          $ref: "#/components/responses/Generic409"
        "422":
          $ref: "#/components/responses/CreateSubscriptionUnprocessableEntity422"
        "429":
          $ref: "#/components/responses/Generic429"
    get:
      tags:
        - User Experience Insights Subscriptions
      summary: "Retrieve a list of user experience insight subscriptions"
      description: Retrieve a list of user experience insight subscriptions
      operationId: retrieveUserExperienceInsightSubscriptionList
      parameters:
        - $ref: "#/components/parameters/x-correlator"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      security:
        - openId:
            - user-experience-insights-subscriptions:read
      responses:
        "200":
          description: List of event subscription details
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
            X-Total-Count:
              $ref: "#/components/headers/x-total-count"
            X-Total-Pages:
              $ref: "#/components/headers/x-total-pages"
            Link:
              $ref: "#/components/headers/link"

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionList"
        "400":
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
  /subscriptions/{subscriptionId}:
    get:
      tags:
        - User Experience Insights Subscriptions
      summary: "Operation to retrieve a subscription based on the provided ID"
      operationId: getSubscription
      description: Retrieve a given subscription by ID
      security:
        - openId:
            - user-experience-insights-subscriptions:read
      parameters:
        - $ref: "#/components/parameters/SubscriptionId"
        - $ref: "#/components/parameters/x-correlator"
      responses:
        "200":
          description: OK
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "400":
          $ref: "#/components/responses/SubscriptionIdRequired400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"
    delete:
      tags:
        - User Experience Insights Subscriptions
      summary: "Operation to delete a subscription"
      operationId: deleteSubscription
      description: Delete a given subscription by ID
      security:
        - openId:
            - user-experience-insights-subscriptions:delete
      parameters:
        - $ref: "#/components/parameters/SubscriptionId"
        - $ref: "#/components/parameters/x-correlator"
      responses:
        "204":
          description: apiName subscription deleted
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
        "202":
          description: |
            Request accepted to be processed. It applies for async deletion
            process.
          headers:
            x-correlator:
              $ref: "#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionAsync"
        "400":
          $ref: "#/components/responses/SubscriptionIdRequired400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"

components:
  securitySchemes:
    openId:
      type: openIdConnect
      description: Common security scheme for all CAMARA APIs
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
    notificationsBearerAuth:
      description: Bearer authorization for notifications
      type: http
      scheme: bearer
      bearerFormat: "{$request.body#/sinkCredential.credentialType}"
  parameters:
    SubscriptionId:
      name: subscriptionId
      in: path
      description: |
        Subscription identifier that was obtained from the create event
        subscription operation
      required: true
      schema:
        $ref: "#/components/schemas/SubscriptionId"
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
    page:
      name: page
      in: query
      description: >
        Requested page number. Pages are 1-indexed.
        Values below 1 are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: "#/components/schemas/Page"

    perPage:
      name: perPage
      in: query
      description: >
        Number of subscriptions to return per page.
        Values outside the allowed range are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: "#/components/schemas/PerPage"
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
    x-total-count:
      description: Total number of items. Mirrors `pagination.totalCount` in the response body.
      required: false
      schema:
        $ref: "#/components/schemas/TotalCount"

    x-total-pages:
      description: Total number of pages. Mirrors `pagination.totalPages` in the response body.
      required: false
      schema:
        $ref: "#/components/schemas/TotalPages"

    link:
      description: |
        Navigation links for paginated results following
        [RFC 8288](https://www.rfc-editor.org/rfc/rfc8288).
        Includes only the rels applicable to the current position
        (`first`, `prev`, `next`, `last`). All original query parameters
        are preserved in Link URLs.
        Example:
          Link: <https://api.example.com/v1/resources?page=1&perPage=20>; rel="first",
                <https://api.example.com/v1/resources?page=2&perPage=20>; rel="prev",
                <https://api.example.com/v1/resources?page=4&perPage=20>; rel="next",
                <https://api.example.com/v1/resources?page=5&perPage=20>; rel="last"
      required: false
      schema:
        type: string
        maxLength: 8192
  schemas:
    XCorrelator:
      type: string
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      example: "b4333c46-49c0-4f62-80d7-f0ef930f1c46"
    Pagination:
      description: Pagination details helping to navigate through paged results efficiently.
      type: object
      properties:
        page:
          $ref: "#/components/schemas/Page"
        perPage:
          $ref: "#/components/schemas/PerPage"
        totalCount:
          $ref: "#/components/schemas/TotalCount"
        totalPages:
          $ref: "#/components/schemas/TotalPages"
    Page:
      type: integer
      format: int32
      minimum: 1
      maximum: 2147483647
      default: 1
      description: Current page number (1-indexed).
      example: 1
    PerPage:
      type: integer
      format: int32
      minimum: 1
      maximum: 100
      default: 20
      description: Number of items per page.
      example: 20
    TotalCount:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of items matching the query, after filters applied. MAY be omitted where a full count query is prohibitively expensive.
      example: 87
    TotalPages:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of pages. Equals ceil(totalCount / perPage). MAY be omitted where totalCount is omitted.
      example: 5
    Subscription:
      description: Represents a event-type subscription.
      type: object
      required:
        - sink
        - protocol
        - config
        - types
        - id
      properties:
        protocol:
          $ref: "#/components/schemas/Protocol"
        sink:
          type: string
          format: uri
          maxLength: 2048
          pattern: ^https:\/\/.+$
          description: The address to which events shall be delivered using the selected protocol.
          example: "https://endpoint.example.com/sink"
        types:
          description: |
            Camara Event types eligible to be delivered by this subscription.
            Note: the maximum number of event types per subscription will be decided at API project level
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/ApiEventType"
        config:
          $ref: "#/components/schemas/Config"
        id:
          $ref: "#/components/schemas/SubscriptionId"
        startsAt:
          $ref: "#/components/schemas/DateTime"
        expiresAt:
          $ref: "#/components/schemas/DateTime"
        status:
          type: string
          description: |-
            Current status of the subscription - Management of Subscription State engine is not mandatory for now. Note not all statuses may be considered to be implemented. Details:
              - `ACTIVATION_REQUESTED`: Subscription creation (POST) is triggered but subscription creation process is not finished yet.
              - `ACTIVE`: Subscription creation process is completed. Subscription is fully operative.
              - `INACTIVE`: Subscription is temporarily inactive, but its workflow logic is not deleted.
              - `EXPIRED`: Subscription is ended (no longer active). This status applies when subscription is ended due to `SUBSCRIPTION_EXPIRED` or `ACCESS_TOKEN_EXPIRED` event.
              - `DELETED`: Subscription is ended as deleted (no longer active). This status applies when subscription information is kept (i.e. subscription workflow is no longer active but its meta-information is kept).
          enum:
            - ACTIVATION_REQUESTED
            - ACTIVE
            - EXPIRED
            - INACTIVE
            - DELETED
      discriminator:
        propertyName: protocol
        mapping:
          HTTP: "#/components/schemas/HTTPSubscriptionResponse"
    SubscriptionList:
      description: Response with subscriptions list
      type: object
      required:
        - subscriptions
        - pagination
      properties:
        subscriptions:
          description: Subscriptions list
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: "#/components/schemas/Subscription"
        pagination:
          $ref: "#/components/schemas/Pagination"
    SubscriptionAsync:
      description: Response for a event-type subscription request managed asynchronously (Creation or Deletion)
      type: object
      required:
        - id
      properties:
        id:
          $ref: "#/components/schemas/SubscriptionId"

    SubscriptionId:
      type: string
      maxLength: 256
      description: The unique identifier of the subscription in the scope of the subscription manager. When this information is contained within an event notification, it SHALL be referred to as `subscriptionId` as per the Commonalities Event Notification Model.
      example: qs15-h556-rt89-1298
    Device:
      description: |
        End-user equipment able to connect to a mobile network. Examples of devices include smartphones or IoT sensors/actuators.
            The developer can choose to provide the below specified device identifiers:
            * `ipv4Address`
            * `ipv6Address`
            * `phoneNumber`
            * `networkAccessIdentifier`
            NOTE1: the network operator might support only a subset of these options. The API invoker can provide multiple identifiers to be compatible across different network operators. In this case the identifiers MUST belong to the same device.
            NOTE2: as for this Commonalities release, we are enforcing that the networkAccessIdentifier is only part of the schema for future-proofing, and CAMARA does not currently allow its use. After the CAMARA meta-release work is concluded and the relevant issues are resolved, its use will need to be explicitly documented in the guidelines.
      type: object
      properties:
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
        networkAccessIdentifier:
          $ref: "#/components/schemas/NetworkAccessIdentifier"
        ipv4Address:
          $ref: "#/components/schemas/DeviceIpv4Addr"
        ipv6Address:
          $ref: "#/components/schemas/DeviceIpv6Address"
      minProperties: 1

    NetworkAccessIdentifier:
      description: |
        A public identifier addressing a subscription in a mobile network. In
        3GPP terminology, it corresponds to the GPSI formatted with the
        External Identifier ({Local Identifier}@{Domain Identifier}). Unlike
        the telephone number, the network access identifier is not subjected
        to portability ruling in force, and is individually managed by each
        operator.
      type: string
      example: "123456789@domain.com"

    PhoneNumber:
      description: |
        A public identifier addressing a telephone subscription. In mobile
        networks it corresponds to the MSISDN (Mobile Station International
        Subscriber Directory Number). In order to be globally unique it has to
        be formatted in international format, according to E.164 standard,
        prefixed with '+'.
      type: string
      pattern: '^\+[1-9][0-9]{4,14}$'
      example: "+123456789"

    DeviceIpv4Addr:
      type: object
      description: |
        The device should be identified by either the public (observed) IP
        address and port as seen by the application server, or the private
        (local) and any public (observed) IP addresses in use by the device
        (this information can be obtained by various means, for example from
        some DNS servers).

        If the allocated and observed IP addresses are the same (i.e. NAT is
        not in use) then  the same address should be specified for both
        publicAddress and privateAddress.

        If NAT64 is in use, the device should be identified by its
        publicAddress and publicPort, or separately by its allocated IPv6
        address (field ipv6Address of the Device object)

        In all cases, publicAddress must be specified, along with at least one
        of either privateAddress or publicPort, dependent upon which is known.
        In general, mobile devices cannot be identified by their public IPv4
        address alone.
      properties:
        publicAddress:
          $ref: "#/components/schemas/SingleIpv4Addr"
        privateAddress:
          $ref: "#/components/schemas/SingleIpv4Addr"
        publicPort:
          $ref: "#/components/schemas/Port"
      anyOf:
        - required: [publicAddress, privateAddress]
        - required: [publicAddress, publicPort]
      example: {"publicAddress":"84.125.93.10", "publicPort":59765}

    SingleIpv4Addr:
      description: A single IPv4 address with no subnet mask
      type: string
      format: ipv4
      example: "84.125.93.10"

    DeviceIpv6Address:
      description: |
        The device should be identified by the observed IPv6 address, or by any
        single IPv6 address from within the subnet allocated to the device
        (e.g. adding ::0 to the /64 prefix).

        The session shall apply to all IP flows between the device subnet and
        the specified application server, unless further restricted by the
        optional parameters devicePorts or applicationServerPorts.
      type: string
      format: ipv6
      example: 2001:db8:85a3:8d3:1319:8a2e:370:7344

    Port:
      description: TCP or UDP port number
      type: integer
      minimum: 0
      maximum: 65535
    Protocol:
      type: string
      enum: ["HTTP", "MQTT3", "MQTT5", "AMQP", "NATS", "KAFKA"]
      description: |
        Identifier of a delivery protocol. Only HTTP is allowed for now
      example: "HTTP"
    Config:
      description: |
        Implementation-specific configuration parameters needed by the
        subscription manager for acquiring events.
        In CAMARA we have predefined attributes like `subscriptionExpireTime`.
        Specific event type attributes must be defined in `subscriptionDetail`
        Note: if a request is performed for several event type, all subscribed
        event will use same `config` parameters.
      type: object
      required:
        - subscriptionDetail
      properties:
        subscriptionDetail:
          $ref: "#/components/schemas/CreateSubscriptionDetail"
        subscriptionExpireTime:
          type: string
          format: date-time
          description: |
            The subscription expiration time (in date-time format) requested by
            the API consumer. Up to API project decision to keep it.
            It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
          example: "2023-07-03T12:27:08.312Z"
        datatype:
          type: string
          description: |
            POOR_QOE_REPORT: Detects poor network experience and reports the collected statistical data. 
            PERIODIC_REPORT: Periodically collecting and reporting data. 
            ALL: Detects data collected and reported by the poor network experience reporting function. If no poor quality is detected, the data is reported periodically.
          enum: 
           - POOR_QOE_REPORT
           - PERIODIC_REPORT
           - ALL
    SinkCredential:
      description: A sink credential provides authentication or authorization information necessary to enable delivery of events to a target.
      type: object
      properties:
        credentialType:
          type: string
          enum:
            - ACCESSTOKEN
            - PRIVATE_KEY_JWT
          description: |
            The type of the credential - MUST be set to ACCESSTOKEN or PRIVATE_KEY_JWT for now
      discriminator:
        propertyName: credentialType
        mapping:
          ACCESSTOKEN: "#/components/schemas/AccessTokenCredential"
          PRIVATE_KEY_JWT: "#/components/schemas/PrivateKeyJWTCredential"
      required:
        - credentialType
    AccessTokenCredential:
      type: object
      description: An access token credential. This type of credential is meant to be used by API Consumers that have limited capabilities to handle authorization requests.
      allOf:
        - $ref: "#/components/schemas/SinkCredential"
        - type: object
          properties:
            accessToken:
              description: REQUIRED. An access token is a token granting access to the target resource.
              type: string
              maxLength: 4096
            accessTokenExpiresUtc:
              type: string
              format: date-time
              maxLength: 64
              description: |
                REQUIRED. An absolute (UTC) timestamp at which the token shall be considered expired.
                In the case of an ACCESS_TOKEN_EXPIRED termination reason, implementation should notify the client before the expiration date.
                If the access token is a JWT and registered "exp" (Expiration Time) claim is present, the two expiry times should match.
                It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
              example: "2023-07-03T12:27:08.312Z"
            accessTokenType:
              description: REQUIRED. Type of the access token (See [OAuth 2.0](https://tools.ietf.org/html/rfc6749#section-7.1)).
              type: string
              enum:
                - bearer
          required:
            - accessToken
            - accessTokenExpiresUtc
            - accessTokenType
    PrivateKeyJWTCredential:
      type: object
      description: Use PRIVATE_KEY_JWT to get an access token. The authorization server information needed for this type of sink credential (token endpoint, client ID, JWKS URL) is shared upfront between the client and the CAMARA entity. This type of credential is to be used by clients that have an authorization server.
      allOf:
        - $ref: "#/components/schemas/SinkCredential"

    CreateSubscriptionDetail:
      description: The detail of the requested event subscription
      type: object
      properties:
        device:
          description: |
            This API need to carry the subscriber's GPSI/MSISDN.           
          $ref: "#/components/schemas/Device"
        appcationType:
          description: |
            Indicates the Application type. If not carried, the carrier configures mainstream application types (video, games, live streaming) locally. 
          $ref: "#/components/schemas/AppcationType"           
      required:
        - device

    SubscriptionRequest:
      description: The request for creating a event-type event subscription
      type: object
      required:
        - sink
        - protocol
        - config
        - types
      properties:
        protocol:
          $ref: "#/components/schemas/Protocol"
        sink:
          type: string
          format: uri
          maxLength: 2048
          pattern: ^https:\/\/.+$
          description: The address to which events shall be delivered using the selected protocol.
          example: "https://endpoint.example.com/sink"
        sinkCredential:
          $ref: "#/components/schemas/SinkCredential"
        types:
          description: |
            Camara Event types eligible to be delivered by this subscription.
            References ApiEventType (not the full NotificationEvent union) —
            subscription requests target API-specific events only; lifecycle
            events are server-initiated and cannot be subscribed to directly.
            Note: the maximum number of event types per subscription will be decided at API project level.
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/ApiEventType"
        config:
          $ref: "#/components/schemas/Config"
      discriminator:
        propertyName: protocol
        mapping:
          HTTP: "#/components/schemas/HTTPSubscriptionRequest"
    ApiEventType:
      type: string
      description: |
        Enum of API-specific event type strings for this API project.
        The reverse-DNS prefix `org.camaraproject.<api-name>` makes each value
        globally unique, so two different API groups can independently define
        identically-named event types without any collision risk.
      enum:
        - org.camaraproject.user-experience-insights.v0.eventUserExperienceRecords
        - org.camaraproject.user-experience-insights.v0.eventSubscriptionEnded
    BitRate:
      type: string
      description: |
        String representing a bit rate that shall be formatted as follows:
        pattern: "^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$"
        Examples: "125 Mbps", "0.125 Gbps", "125000 Kbps".
    TrafficVolume:
      type: string
      description: |
        String representing a traffic volume measured in bytes that shall be formatted as follows:
        Pattern: '^\d+(\.\d+)? (B|kB|MB|GB|TB)$'
        Examples:"125 MB", "0.125 GB", "125000 kB"
    Dnn:
      type: string
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003; 
        it shall contain either a DNN Network Identifier, or a full DNN with both the Network 
        Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2.
        It shall be coded as string in which the labels are separated by dots 
        (e.g. "Label1.Label2.Label3").   
    QciOr5qi:
       type: integer
       description: |
                It is provided to service data flows as a reference level for specific packet forwarding behaviors (such as packet loss rate and delay).
    NetType: 
       type: string
       description: Indicates the type of network accessed. SA/EPC    
    AppSignalingData:
      type: object
      description: |
        Basic .
      properties:
        dnn:
          $ref: '#/components/schemas/Dnn'
        qciOr5qi:
          $ref: "#/components/schemas/QciOr5qi"
        netType:  
          $ref: '#/components/schemas/NetType'
    VolumeMeasurement:
      type: object
      description: |
        Application-level traffic statistics.
      properties:
        totalVolume:
          description: total running traffic statistics.  
          $ref: "#/components/schemas/TrafficVolume"  
        ulVolume:
          description: this shall indicate the volume (bytes) of user plane traffic for the uplink direction. 
          $ref: "#/components/schemas/TrafficVolume"
        dlVolume:
          description: this shall indicate the volume (bytes) of user plane traffic for the downlink direction.
          $ref: "#/components/schemas/TrafficVolume"       
    ApplicationIndicatorStatistics:
      type: object
      description: |
        Basic statistics on the application during the application use period.
      properties:
        subAppStartTime:
          $ref: "#/components/schemas/DateTime"
        subAppEffDur:
          type: integer
          description: |
            Unsigned integer identifying a period of time in units of seconds
        avgBwUl:
          description: Average uplink bandwidth of an application.   
          $ref: "#/components/schemas/BitRate"  
        avgBwDl:
          description: Average downlink bandwidth of an application.
          $ref: "#/components/schemas/BitRate"
        maxBwUl:
          description: Maximum uplink bandwidth of the application
          $ref: "#/components/schemas/BitRate"   
        maxBwDl:
          description: Maximum downlink bandwidth of the application
          $ref: "#/components/schemas/BitRate"   
        subAppVol:
          $ref: "#/components/schemas/VolumeMeasurement"
        maxDelayAn:
          type: integer
          description: |
            Maximum wireless-side latency of an application.
        maxDelayDn:
          type: integer
          description: |
            Maximum wired-side latency of an application.
    ApplicationExperienceAnalysis:
      type: object
      description: |
        Basic statistics on the application during the application use period.
      properties:
        avgQoe:
          type: integer
          description: |
            Average score of experience analysis.Value range: 1 to 100 points.
        maxResolution:
          type: string
          description: |
            Maximum resolution in the experience analysis period.
            example: The value can be 2160, 1080, 720, or 480. 1080 indicates 1080p (1920 x 1080).
        mostResolution:
          type: string
          description: |
             The resolution with the highest duration ratio within the experience analysis perio
             example: The value can be 2160, 1080, 720, or 480. 1080 indicates 1080p (1920 x 1080).   
        maxBitRateUl:
          description: Maximum uplink bit rate (kbit/s).
          $ref: "#/components/schemas/BitRate"
        avgBitRateUl:
          description: Average uplink bit rate (kbit/s)
          $ref: "#/components/schemas/BitRate"   
        maxBitRateDl:
          description: Maximum downlink bit rate (kbit/s)
          $ref: "#/components/schemas/BitRate"   
        avgBitRateDl:
          description: Average downlink bit rate (kbit/s)
          $ref: "#/components/schemas/BitRate"
        stallSec: 
          type: integer
          description: Frame freezing duration, in seconds.
        stallNum: 
          type: integer
          description: Number of frame freezing times. The detection period is 5 seconds.  
        serviceDelay:
          type: integer
          description: Service latency, in seconds.
        initialDur:
          type: integer
          description: |
             Initial service buffering duration, in seconds. The options are as follows:
    AreaData:
      type: object
      description: |
             Information about the area where a user is located. The area information can be used to monitor the quality of the network in the area.
      properties:
        city:
          type: string
          description:  user's city of residence.
        district:
          type: string
          description:  areas or streets within a city. 
    AppSignalingAndStatisticsAnalysisRecord:
      type: object
      description: |
        the network's confidence level at being able to meet the network
        demands of a given application for a given terminal device.
      properties:
        starttime:
          $ref: "#/components/schemas/DateTime"
        endtime:
          $ref: "#/components/schemas/DateTime" 
        appcationType:
          $ref: "#/components/schemas/AppcationType"
        applicationId:
          $ref: "#/components/schemas/ApplicationId"    
        areaData: 
          $ref: "#/components/schemas/AreaData"
        appSignalingData: 
          $ref: "#/components/schemas/AppSignalingData"        
        applicationIndicatorStatistics:
          $ref: "#/components/schemas/ApplicationIndicatorStatistics"
        applicationExperienceAnalysis:
          $ref: "#/components/schemas/ApplicationExperienceAnalysis"
    UserExperienceInsightsRecords:
       type: object
       description: |
         User Experience Collection and Recording
       properties:
        appSignalingAndStatisticsAnalysisRecords:
          type: array
          items:
            $ref: '#/components/schemas/AppSignalingAndStatisticsAnalysisRecord'
          minItems: 1
    ApplicationId:
      description: Indicates the Application Identifier. Negotiated by the carrier and application vendor and configured on the carrier network.
      type: string
      format: uuid
    AppcationType:
      description: Indicates the Application type. Negotiated by the carrier and application vendor and configured on the carrier network.  
      type: string
      example: video/game/Live Video
    Source:
      type: string
      format: uri-reference
      minLength: 1
      maxLength: 2048
      description: |
        Identifies the context in which an event happened - be a non-empty `URI-reference` like:
        - URI with a DNS authority:
          * https://github.com/cloudevents
          * mailto:cncf-wg-serverless@lists.cncf.io
        - Universally-unique URN with a UUID:
          * urn:uuid:6e8bc430-9c3a-11d9-9669-0800200c9a66
        - Application-specific identifier:
          * /cloudevents/spec/pull/123
          * 1-555-123-4567
      example: "https://notificationSendServer12.example.com"
    NotificationEvent:
      description: |
        Union of all valid notification event groups at the callback endpoint.
        This schema owns no discriminator — routing within each group is
        handled by ApiNotificationEvent and SubscriptionLifecycleEvent
        respectively. Its only responsibility is to enumerate which groups
        are valid payloads for this API's notification callback.
      oneOf:
        - $ref: "#/components/schemas/ApiNotificationEvent"
        - $ref: "#/components/schemas/SubscriptionLifecycleEvent"
    ApiNotificationEvent:
      description: |
        API-specific notification event group.
        Extends the CloudEvent envelope and constrains `type` to the set of
        event types defined by this API project.
        Adding a new event type only requires updating ApiEventType and the
        discriminator mapping below — the CloudEvent base never changes.
      allOf:
        - $ref: "#/components/schemas/CloudEvent"
        - type: object
          properties:
            type:
              $ref: "#/components/schemas/ApiEventType"
      discriminator:
        propertyName: "type"
        mapping:
          org.camaraproject.user-experience-insights-subscriptions.v0.eventUserExperienceRecords:
            "#/components/schemas/EventUserExperienceRecords"
          org.camaraproject.user-experience-insights-subscriptions.v0.eventSubscriptionEnded:
            "#/components/schemas/EventSubscriptionEnded"
    SubscriptionLifecycleEvent:
      description: |
        Subscription lifecycle event group, common to all CAMARA APIs that
        support explicit subscriptions.
        Extends the CloudEvent envelope and constrains `type` to the set of
        lifecycle event types managed by Commonalities.
      allOf:
        - $ref: "#/components/schemas/CloudEvent"
        - type: object
          properties:
            type:
              $ref: "#/components/schemas/SubscriptionLifecycleEventType"
      discriminator:
        propertyName: type
        mapping:
          org.camaraproject.user-experience-insights-subscriptions.v0.subscription-started: "#/components/schemas/EventSubscriptionStarted"
          org.camaraproject.user-experience-insights-subscriptions.v0.subscription-updated: "#/components/schemas/EventSubscriptionUpdated"
          org.camaraproject.user-experience-insights-subscriptions.v0.subscription-ended: "#/components/schemas/EventSubscriptionEnded"

    SubscriptionLifecycleEventType:
      type: string
      description: |
        Enum of subscription lifecycle event type strings.
        These are managed by Commonalities and are identical across all CAMARA
        APIs that support explicit subscriptions.
        Kept as a separate named schema so the set of valid lifecycle type
        strings can be referenced independently from the discriminated schema.
      enum:
        - org.camaraproject.user-experience-insights-subscriptions.v0.subscription-started
        - org.camaraproject.user-experience-insights-subscriptions.v0.subscription-updated
        - org.camaraproject.user-experience-insights-subscriptions.v0.subscription-ended
    CloudEvent:
      type: object
      description: |
        CloudEvents 1.0 specification envelope.
        This schema is the stable base for all CAMARA event notifications.
        It imposes no constraints on `type` values or `data` structure —
        those concerns belong to the API-specific and lifecycle group schemas.
      required:
        - id
        - source
        - specversion
        - type
        - time
      properties:
        id:
          type: string
          maxLength: 256
          description: Identifier of this event, unique within the source context.
        source:
          $ref: "#/components/schemas/Source"
        type:
          type: string
          maxLength: 512
          description: |
            Identifies the event type. CAMARA APIs use reverse-DNS notation:
            `org.camaraproject.<api-name>.<event-version>.<event-name>`
            The api-name segment makes each type globally unique across API groups.
        specversion:
          type: string
          description: Version of the specification to which this event conforms (must be 1.0 if it conforms to cloudevents 1.0.2 version)
          enum:
            - "1.0"
        datacontenttype:
          type: string
          description: 'media-type that describes the event payload encoding, must be "application/json" for CAMARA APIs'
          enum:
            - application/json
        data:
          type: object
          description: Event details payload. Structure is defined by each concrete event schema.
        time:
          $ref: "#/components/schemas/DateTime"

    EventUserExperienceRecords:
      description: event structure for User Experience Insights Records
      allOf:
        - $ref: "#/components/schemas/ApiNotificationEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserExperienceInsightsRecords"
    EventSubscriptionStarted:
      description: event structure for event subscription started
      allOf:
        - $ref: "#/components/schemas/SubscriptionLifecycleEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionStarted"
    EventSubscriptionUpdated:
      description: event structure for event subscription updated
      allOf:
        - $ref: "#/components/schemas/SubscriptionLifecycleEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionUpdated"
    EventSubscriptionEnded:
      description: event structure for event subscription ended
      allOf:
        - $ref: "#/components/schemas/ApiNotificationEvent"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SubscriptionEnded"
    SubscriptionStarted:
      description: Event detail structure for subscription started event
      type: object
      required:
        - initiationReason
        - subscriptionId
      properties:
        initiationReason:
          $ref: "#/components/schemas/InitiationReason"
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
        initiationDescription:
          type: string
          maxLength: 512
          description: Description of subscription initiation

    InitiationReason:
      type: string
      description: |
        - SUBSCRIPTION_CREATED - Subscription created by API Server
      enum:
        - SUBSCRIPTION_CREATED

    SubscriptionUpdated:
      description: Event detail structure for subscription updated event
      type: object
      required:
        - updateReason
        - subscriptionId
      properties:
        updateReason:
          $ref: "#/components/schemas/UpdateReason"
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
        updateDescription:
          type: string
          maxLength: 512
          description: Description of subscription update

    UpdateReason:
      type: string
      description: |
        - SUBSCRIPTION_ACTIVE - API server transitioned subscription status to `ACTIVE`
        - SUBSCRIPTION_INACTIVE - API server transitioned subscription status to `INACTIVE`
      enum:
        - SUBSCRIPTION_ACTIVE
        - SUBSCRIPTION_INACTIVE
    SubscriptionEnded:
      description: Event detail structure for subscription ended event
      type: object
      required:
        - terminationReason
        - subscriptionId
      properties:
        terminationReason:
          $ref: "#/components/schemas/TerminationReason"
        subscriptionId:
          $ref: "#/components/schemas/SubscriptionId"
        terminationDescription:
          description: Explanation why a subscription ended or had to end.
          type: string

    TerminationReason:
      type: string
      description: |
        - NETWORK_TERMINATED - API server stopped sending notification
        - SUBSCRIPTION_EXPIRED - Subscription expire time (optionally set by
        the requester) has been reached
        - MAX_EVENTS_REACHED - Maximum number of events (optionally set by the
        requester) has been reached
        - ACCESS_TOKEN_EXPIRED - Access Token sinkCredential (optionally set by
        the requester) expiration time has been reached
        - SUBSCRIPTION_DELETED - Subscription was deleted by the requester
      enum:
        - MAX_EVENTS_REACHED
        - NETWORK_TERMINATED
        - SUBSCRIPTION_EXPIRED
        - ACCESS_TOKEN_EXPIRED
        - SUBSCRIPTION_DELETED

    DateTime:
      type: string
      format: date-time
      description: |
        Timestamp of when the occurrence happened.
        It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      example: "2023-07-03T12:27:08.312Z"

    EventTypeNotification:
      type: string
      description: |
        event-type - Event triggered when an event-type event occurred
        subscription-ended: Event triggered when the subscription ends
      enum:
        - org.camaraproject.user-experience-insights.v0.network-quality
        - org.camaraproject.user-experience-insights.v0.subscription-ended
    ErrorInfo:
      type: object
      description: Error information
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          description: HTTP response status code
        code:
          type: string
          description: A human-readable code to describe the error
        message:
          type: string
          description: A human-readable description of what the event represents

  responses:
    CreateSubscriptionBadRequest400:
      description: Problem with the client request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
                      - INVALID_PROTOCOL
                      - INVALID_CREDENTIAL
                      - INVALID_TOKEN
                      - INVALID_SINK
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.
            GENERIC_400_INVALID_PROTOCOL:
              description: Invalid protocol for events subscription management
              value:
                status: 400
                code: INVALID_PROTOCOL
                message: Only HTTP is supported
            GENERIC_400_INVALID_CREDENTIAL:
              description: Invalid sink credential type
              value:
                status: 400
                code: INVALID_CREDENTIAL
                message: Only Access token is supported
            GENERIC_400_INVALID_TOKEN:
              description: Invalid token type for sink credential of type ACCESSTOKEN
              value:
                status: 400
                code: INVALID_TOKEN
                message: Only bearer token is supported
            GENERIC_400_INVALID_SINK:
              description: Invalid sink value
              value:
                status: 400
                code: INVALID_SINK
                message: sink not valid for the specified protocol
    Generic400:
      description: Problem with the client request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
    SubscriptionIdRequired400:
      description: Problem with the client request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_SUBSCRIPTION_ID_REQUIRED:
              description: subscription id is required
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: "Expected property is missing: subscriptionId"
    Generic401:
      description: Authentication problem with the client request
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 401
                  code:
                    enum:
                      - UNAUTHENTICATED

          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated and a new authentication is required
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials. A new authentication is required.

    Generic403:
      description: Client does not have sufficient permission
      headers:
        x-correlator:
          $ref: "#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorInfo"
              - type: object
                properties:
                  status:
                    enum:
                      - 403
                  code:
                    enum:
                      - PERMISSION_DENIED
          examples:
